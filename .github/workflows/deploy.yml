name: Webots Simulation
on: [push]

jobs:
  test-robot:
    runs-on: ubuntu-latest
    container: cyberbotics/webots:latest # Uses the image you want
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile C Controller
        run: |
          # We don't need to install 'make' or 'gcc' because 
          # the cyberbotics image already has them!
          cd controllers/ure_can_grasper
          make

      - name: Run Simulation
        run: |
          # We use xvfb-run ONLY because the GitHub server has no physical monitor.
          # Everything else is exactly like your Dockerfile.
          xvfb-run webots --batch --mode=fast --stdout --stderr worlds/ure.wbt